<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculaor</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div id="calculator">
        <input id="display" readonly>
        <div id="keys">
            <button class="operation"onclick="diaplayThe('+')">+</button>
            <button onclick="diaplayThe('7')">7</button>
            <button onclick="diaplayThe('8')">8</button>
            <button onclick="diaplayThe('9')">9</button>
            <button class="operation"onclick="diaplayThe('-')">-</button>
            <button onclick="diaplayThe('4')">4</button>
            <button onclick="diaplayThe('5')">5</button>
            <button onclick="diaplayThe('6')">6</button>
            <button class ="operation" onclick="diaplayThe('*')">*</button>
            <button onclick="diaplayThe('1')">1</button>
            <button onclick="diaplayThe('2')">2</button>
            <button onclick="diaplayThe('3')">3</button>
            <button class="operation" onclick="diaplayThe('/')">/</button>
            <button onclick="diaplayThe('0')">0</button>
            <button onclick="diaplayThe('.')">.</button>
            <button onclick="calculate()">=</button>
            <button class="operation" onclick="clearDisplay()">c</button>   
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
